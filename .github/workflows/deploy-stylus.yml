name: Deploy Stylus Engine

on:
  workflow_dispatch:
    inputs:
      registry_address:
        description: 'Registry contract address to authorize'
        required: true
        default: '0xe873D942cB0aF313AE664A88bc918A1aD606B946'

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - name: Install cargo-stylus
        run: cargo install cargo-stylus

      - name: Generate lockfile
        working-directory: contracts/stylus
        run: cargo generate-lockfile

      - name: Check Stylus contract
        working-directory: contracts/stylus
        run: cargo stylus check --endpoint https://sepolia-rollup.arbitrum.io/rpc

      - name: Deploy Stylus contract
        working-directory: contracts/stylus
        run: |
          set -o pipefail
          cargo stylus deploy \
            --endpoint https://sepolia-rollup.arbitrum.io/rpc \
            --private-key ${{ secrets.DEPLOYER_PRIVATE_KEY }} \
            --no-verify \
            --max-fee-per-gas-gwei 1 \
            2>&1 | tee deploy-output.txt

          # Extract deployed address (strip ANSI color codes first)
          STYLUS_ADDRESS=$(sed 's/\x1b\[[0-9;]*m//g' deploy-output.txt | grep -oiP 'deployed code at address[: ]+\K0x[a-fA-F0-9]{40}' | head -1 || true)
          if [ -z "$STYLUS_ADDRESS" ]; then
            echo "ERROR: could not extract deployed address from output"
            exit 1
          fi
          echo "STYLUS_ADDRESS=$STYLUS_ADDRESS" >> $GITHUB_ENV
          echo "## Stylus Engine Deployed" >> $GITHUB_STEP_SUMMARY
          echo "Address: \`$STYLUS_ADDRESS\`" >> $GITHUB_STEP_SUMMARY

      - name: Set authorized registry on Stylus engine
        if: env.STYLUS_ADDRESS != ''
        run: |
          # Install cast (foundry)
          curl -L https://foundry.paradigm.xyz | bash
          source ~/.bashrc || true
          ~/.foundry/bin/foundryup

          ~/.foundry/bin/cast send ${{ env.STYLUS_ADDRESS }} \
            "set_authorized_registry(address)" \
            ${{ github.event.inputs.registry_address }} \
            --rpc-url https://sepolia-rollup.arbitrum.io/rpc \
            --private-key ${{ secrets.DEPLOYER_PRIVATE_KEY }}

          echo "## Registry Authorized" >> $GITHUB_STEP_SUMMARY
          echo "Registry \`${{ github.event.inputs.registry_address }}\` authorized on Stylus engine \`${{ env.STYLUS_ADDRESS }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Deployment summary
        if: env.STYLUS_ADDRESS != ''
        run: |
          echo "## Measured Gas (Arbitrum Sepolia)" >> $GITHUB_STEP_SUMMARY
          echo "submitVote through registry + Stylus engine: ~480k gas" >> $GITHUB_STEP_SUMMARY
          echo "(measured txs: 0x7d488c95fcb11876d8381f9ddfec8feeec6556d0f066830f9f1df7d96cd4c189, 479,785 gas)" >> $GITHUB_STEP_SUMMARY
