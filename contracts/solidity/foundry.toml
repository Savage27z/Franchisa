[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
via_ir = true

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"
robinhood_testnet = "https://rpc.testnet.chain.robinhood.com"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }
robinhood_testnet = { key = "placeholder", url = "https://explorer.testnet.chain.robinhood.com/api/", chain = 46630 }
